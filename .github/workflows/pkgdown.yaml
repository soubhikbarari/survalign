# Build pkgdown site and deploy to gh-pages branch.
# Skips the GSS vignette to keep build times reasonable.
on:
  push:
    branches: [main]
  workflow_dispatch:

name: pkgdown

permissions:
  contents: write

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Build site (skip GSS vignette)
        run: |
          Rscript -e "
            pkgdown::init_site()
            pkgdown::build_home()
            pkgdown::build_reference()
            pkgdown::build_articles(topics = c('survalign', 'case-ces'))
            pkgdown::build_news()
          "

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
